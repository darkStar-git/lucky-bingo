<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Lucky Bingo</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <h2 id="resultado">Aguardando sorteio...</h2>


    <table id="tabela">
        <thead>
            <tr>
                <th class="cor1">B</th>
                <th class="cor2">I</th>
                <th class="cor3">N</th>
                <th class="cor4">G</th>
                <th class="cor5">O</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>

    <br><br>
    
    <footer class="controles">
        <div class="botoes">

            <button class="sortear" onclick="sortearNumero()">
                <i class="fas fa-dice"></i> Sortear
            </button>

            <div class="botoes2">
                <button class="reiniciar" onclick="reiniciarJogo()">
                    <i class="fas fa-redo"></i> Reiniciar
                </button>
                
                <div class="lista-modo">
                    <select class="modo" id="modo">
                        <option value="50">50 Números</option>
                        <option value="75" selected>75 Números</option>
                        <option value="90">90 Números</option>
                    </select>
                </div>
            </div>

        </div>

    </footer>

    <script src="./js/script.js" type="module"></script>

</body>


</html>
